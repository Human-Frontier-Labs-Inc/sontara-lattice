services:
  broker:
    build: .
    command: ["claude-peers", "broker"]
    ports:
      - "7899:7899"
    volumes:
      - broker-data:/data
      - broker-config:/root/.config/claude-peers
    environment:
      - CLAUDE_PEERS_LISTEN=0.0.0.0:7899
      - CLAUDE_PEERS_DB=/data/peers.db
      - CLAUDE_PEERS_NATS=nats://nats:4222
      - CLAUDE_PEERS_NATS_TOKEN=${NATS_TOKEN:-}
    depends_on:
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7899/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    command: ["-js", "--store_dir=/data", "-p", "4222", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.4
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    volumes:
      - wazuh-data:/var/ossec/data
      - wazuh-logs:/var/ossec/logs
      - ./wazuh/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
      - ./wazuh/shared_agent.conf:/var/ossec/etc/shared/default/agent.conf:ro

  gridwatch:
    build: .
    command: ["claude-peers", "gridwatch"]
    ports:
      - "8888:8888"
    volumes:
      - ./gridwatch.example.json:/root/gridwatch.json:ro
    environment:
      - CLAUDE_PEERS_BROKER_URL=http://broker:7899
      - CLAUDE_PEERS_NATS=nats://nats:4222
      - CLAUDE_PEERS_NATS_TOKEN=${NATS_TOKEN:-}
    depends_on:
      broker:
        condition: service_healthy
      nats:
        condition: service_started

  supervisor:
    build: .
    command: ["claude-peers", "supervisor"]
    volumes:
      - ./daemons:/daemons:ro
    environment:
      - CLAUDE_PEERS_BROKER_URL=http://broker:7899
      - CLAUDE_PEERS_NATS=nats://nats:4222
      - CLAUDE_PEERS_NATS_TOKEN=${NATS_TOKEN:-}
      - CLAUDE_PEERS_DAEMONS=/daemons
      - CLAUDE_PEERS_LLM_URL=${LLM_BASE_URL:-http://127.0.0.1:4000/v1}
      - CLAUDE_PEERS_LLM_MODEL=${LLM_MODEL:-vertex_ai/claude-sonnet-4-6}
      - CLAUDE_PEERS_LLM_API_KEY=${LLM_API_KEY:-}
    depends_on:
      broker:
        condition: service_healthy
      nats:
        condition: service_started

  wazuh-bridge:
    build: .
    command: ["claude-peers", "wazuh-bridge"]
    environment:
      - CLAUDE_PEERS_BROKER_URL=http://broker:7899
      - CLAUDE_PEERS_NATS=nats://nats:4222
      - CLAUDE_PEERS_NATS_TOKEN=${NATS_TOKEN:-}
      - WAZUH_ALERTS_PATH=/var/ossec/logs/alerts/alerts.json
    volumes:
      - wazuh-logs:/var/ossec/logs:ro
    depends_on:
      broker:
        condition: service_healthy
      nats:
        condition: service_started
      wazuh-manager:
        condition: service_started

  security-watch:
    build: .
    command: ["claude-peers", "security-watch"]
    environment:
      - CLAUDE_PEERS_BROKER_URL=http://broker:7899
      - CLAUDE_PEERS_NATS=nats://nats:4222
      - CLAUDE_PEERS_NATS_TOKEN=${NATS_TOKEN:-}
    depends_on:
      broker:
        condition: service_healthy
      nats:
        condition: service_started

  response-daemon:
    build: .
    command: ["claude-peers", "response-daemon"]
    environment:
      - CLAUDE_PEERS_BROKER_URL=http://broker:7899
      - CLAUDE_PEERS_NATS=nats://nats:4222
      - CLAUDE_PEERS_NATS_TOKEN=${NATS_TOKEN:-}
      - CLAUDE_PEERS_LLM_URL=${LLM_BASE_URL:-http://127.0.0.1:4000/v1}
      - CLAUDE_PEERS_LLM_MODEL=${LLM_MODEL:-vertex_ai/claude-sonnet-4-6}
      - CLAUDE_PEERS_LLM_API_KEY=${LLM_API_KEY:-}
    depends_on:
      broker:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  broker-data:
  broker-config:
  nats-data:
  wazuh-data:
  wazuh-logs:
