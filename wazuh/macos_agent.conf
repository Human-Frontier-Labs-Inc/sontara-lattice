<agent_config os="Darwin">

  <!-- ============================================================
       SYSCHECK (FIM) — macOS-specific agent config
       macOS uses kqueue for realtime monitoring (not inotify).
       realtime="yes" is supported via kqueue on macOS Wazuh agents.
       ============================================================ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <remove_old_diff>yes</remove_old_diff>

    <!-- ── LaunchAgents / LaunchDaemons (macOS persistence) ──── -->

    <!-- User LaunchAgents — most common persistence vector on macOS -->
    <directories check_all="yes" report_changes="yes" realtime="yes">~/Library/LaunchAgents</directories>

    <!-- System-wide LaunchDaemons (root persistence) -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/Library/LaunchDaemons</directories>

    <!-- System-wide LaunchAgents (all-user persistence) -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/Library/LaunchAgents</directories>

    <!-- Apple system LaunchDaemons — detect tamper of OS-level daemons -->
    <directories check_all="yes" report_changes="yes">/System/Library/LaunchDaemons</directories>
    <directories check_all="yes" report_changes="yes">/System/Library/LaunchAgents</directories>

    <!-- ── Shell RC files (macOS defaults to zsh) ────────────── -->
    <directories check_all="yes" report_changes="yes" realtime="yes">~/.zshrc</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">~/.zprofile</directories>
    <!-- bash still present on some macOS installs -->
    <directories check_all="yes" report_changes="yes" realtime="yes">~/.bashrc</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">~/.bash_profile</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">~/.profile</directories>

    <!-- ── SSH keys ───────────────────────────────────────────── -->
    <directories check_all="yes" report_changes="yes" realtime="yes">~/.ssh</directories>

    <!-- ── Sudoers ────────────────────────────────────────────── -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/sudoers</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/sudoers.d</directories>

    <!-- ── DNS / hosts ───────────────────────────────────────── -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/hosts</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/resolv.conf</directories>

    <!-- ── PAM (macOS uses PAM too) ──────────────────────────── -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/pam.d</directories>

    <!-- ── XDG / Login items (macOS equivalents) ─────────────── -->
    <directories check_all="yes" report_changes="yes">~/Library/Application Support/com.apple.backgroundtaskmanagementagent</directories>

    <!-- ── claude-peers specific ─────────────────────────────── -->
    <directories check_all="yes" report_changes="yes" realtime="yes">~/.local/bin</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">~/.config/claude-peers</directories>

    <!-- Ignore macOS noisy system paths -->
    <ignore>/private/etc/resolv.conf.morehosts</ignore>
    <ignore>/private/etc/xtabs</ignore>
  </syscheck>

  <!-- ============================================================
       ACTIVE RESPONSE
       ============================================================ -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

  <!-- ============================================================
       LOGGING — macOS log sources
       ============================================================ -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/system.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- macOS unified log (security-relevant subsystem) -->
  <localfile>
    <log_format>macos</log_format>
    <query>process == "sudo" OR process == "sshd" OR process == "SecurityAgent"</query>
  </localfile>

</agent_config>
