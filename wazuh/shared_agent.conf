<agent_config>

  <!-- ============================================================
       SYSCHECK (FIM) — shared across all Linux agents
       ============================================================ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <remove_old_diff>yes</remove_old_diff>

    <!-- ── Priority 1: CRITICAL ─────────────────────────────── -->

    <!-- Shell RC persistence -->
    <directories check_all="yes" report_changes="yes" realtime="yes">__USER_HOME__/.bashrc</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">__USER_HOME__/.zshrc</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">__USER_HOME__/.profile</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">__USER_HOME__/.bash_profile</directories>

    <!-- System cron persistence -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/cron.d</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/cron.daily</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/cron.hourly</directories>
    <directories check_all="yes" report_changes="yes">/etc/crontab</directories>

    <!-- DNS hijacking -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/hosts</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/resolv.conf</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/nsswitch.conf</directories>

    <!-- LD_PRELOAD / environment hijacking -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/environment</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/ld.so.preload</directories>

    <!-- PAM authentication bypass -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/pam.d</directories>

    <!-- ── Priority 2: HIGH ──────────────────────────────────── -->

    <!-- Kernel module persistence -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/modules-load.d</directories>

    <!-- Device-triggered persistence -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/udev/rules.d</directories>

    <!-- Privilege escalation -->
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/sudoers</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/sudoers.d</directories>

    <!-- ── Priority 3: MEDIUM ────────────────────────────────── -->

    <!-- XDG autostart (Hyprland / desktop persistence) -->
    <directories check_all="yes" report_changes="yes" realtime="yes">__USER_HOME__/.config/autostart</directories>

    <!-- User systemd persistence -->
    <directories check_all="yes" report_changes="yes" realtime="yes">__USER_HOME__/.config/systemd/user</directories>

    <!-- ── Existing monitored paths (retained) ───────────────── -->

    <!-- SSH keys and auth config -->
    <directories check_all="yes" report_changes="yes" realtime="yes">__USER_HOME__/.ssh</directories>

    <!-- System-wide profile and environment -->
    <directories check_all="yes" report_changes="yes">/etc/profile.d</directories>

    <!-- Systemd unit files -->
    <directories check_all="yes" report_changes="yes">/etc/systemd/system</directories>
    <directories check_all="yes" report_changes="yes">/lib/systemd/system</directories>
    <directories check_all="yes" report_changes="yes">/usr/lib/systemd/system</directories>

    <!-- Spool cron (user crontabs) -->
    <directories check_all="yes" report_changes="yes">/var/spool/cron</directories>

    <!-- Binaries and shared libs -->
    <directories check_all="yes">/usr/local/bin</directories>
    <directories check_all="yes">/usr/bin</directories>
    <directories check_all="yes">/usr/sbin</directories>
    <directories check_all="yes">/sbin</directories>
    <directories check_all="yes">/bin</directories>

    <!-- claude-peers specific paths -->
    <directories check_all="yes" report_changes="yes" realtime="yes">__USER_HOME__/.local/bin</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">__USER_HOME__/.config/claude-peers</directories>

    <!-- Syncthing config (exfil detection) -->
    <directories check_all="yes" report_changes="yes">__USER_HOME__/.local/share/syncthing</directories>
    <directories check_all="yes" report_changes="yes">__USER_HOME__/.config/syncthing</directories>

    <!-- Ignore noisy transient files -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/mnttab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/resolv.conf.morehosts</ignore>
  </syscheck>

  <!-- ============================================================
       ACTIVE RESPONSE — receive quarantine commands from manager
       ============================================================ -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

  <!-- ============================================================
       LOGGING FORMAT
       ============================================================ -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

</agent_config>
